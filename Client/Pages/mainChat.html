<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script type="module" src="/Client/main.js"></script>
        <script type="module" src="/Client/socket.js"></script>
    </head>
    <body>
        <div class="flex items-center justify-center h-screen">
            <main class="bg-white h-180 w-150 rounded-lg relative border-2 border-solid ">
                <div class="h-160 w-full overflow-y-auto">
                    <ul id="Chat-List" class="h-160 w-full overflow-y-auto">
                        <!--
                        <div class="bg-purple-300 w-25 h-8 rounded-lg pl-2 pt-1 my-2.5 mx-2">
                            <p>Hello</p>
                        </div>
                        -->
                        <li class="bg-purple-300 m-2 pl-2 py-1.5 rounded-sm w-35 h-8">Hello World</li>
                    </ul>
                </div>
                <div class="w-full absolute bottom-0 flex flex-row">
                    <textarea id="TextInput" class="bg-gray-200 ml-3 w-120 px-2 py-2 my-2 rounded-lg"></textarea>
                    <button id="SendBtn" class="bg-purple-300 hover:bg-purple-400 rounded-lg ml-2 h-15 w-15 my-2">Send</button>
                </div>
            </main>
        </div>
    </body>
</html>
