<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <script type="module" ="main.js"></script>
        <script type="module" src="socket.js"></script>
    </head>
    <body>
        <div class="flex items-center justify-center h-screen">
            <main class="bg-gray-300 h-180 w-150 rounded-sm relative border-2 border-solid">

                    <textarea id="TextInput" class="bg-gray-200 ml-3 w-120 px-2 py-2 my-2"></textarea>
                    <button id="SendBtn" class="bg-gray-200 hover:bg-gray-400 ml-2 h-15 w-15 my-2">Send</button>
                </div>
            </main>
        </div>
    </body>
</html>
